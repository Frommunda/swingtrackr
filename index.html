<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c1c1e">
<title>SwingTrackr</title>
<style>
:root {
  --bg: #000000;
  --bg-secondary: #1c1c1e;
  --bg-card: #2c2c2e;
  --bg-card-hover: #3a3a3c;
  --text: #ffffff;
  --text-secondary: #ebebf5cc;
  --text-tertiary: #ebebf54d;
  --accent: #0a84ff;
  --accent-glow: rgba(10, 132, 255, 0.15);
  --green: #30d158;
  --red: #ff453a;
  --orange: #ff9f0a;
  --border: #38383a;
  --input-bg: #1c1c1e;
  --overlay: rgba(0,0,0,0.6);
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 500px;
  margin: 0 auto;
  padding-bottom: 100px;
  -webkit-font-smoothing: antialiased;
}

header {
  background: var(--bg-secondary);
  padding: 16px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
header h1 {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, #0a84ff, #5e5ce6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.3px;
}
header .session-info { font-size: 13px; color: var(--text-tertiary); margin-top: 4px; }
.settings-toggle {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: var(--text-secondary);
  padding: 4px;
}

.tabs {
  display: flex;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 58px;
  z-index: 10;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 12px 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-tertiary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.view { display: none; }
.view.active { display: block; }

/* Club Grid */
.club-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; }
.club-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 12px;
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  text-align: center;
  transition: transform 0.1s, background 0.2s, box-shadow 0.2s;
}
.club-btn:active { transform: scale(0.96); background: var(--bg-card-hover); }
.club-btn .brand { font-size: 11px; font-weight: 400; color: var(--text-tertiary); display: block; margin-top: 3px; }
.club-btn .avg { font-size: 13px; color: var(--accent); margin-top: 6px; font-weight: 600; }
.club-btn .count { font-size: 11px; color: var(--text-tertiary); }
.club-btn.has-data { border-color: rgba(10,132,255,0.3); box-shadow: 0 0 20px var(--accent-glow); }

/* Stats View */
.stats-list { padding: 16px; }
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
}
.stat-card h3 { font-size: 16px; margin-bottom: 10px; color: var(--text); }
.stat-card .stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  padding: 5px 0;
  color: var(--text-secondary);
}
.stat-card .stat-row .label { color: var(--text-tertiary); }
.stat-card .shots-list { font-size: 12px; color: var(--text-tertiary); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
.no-data { text-align: center; color: var(--text-tertiary); padding: 60px 20px; font-size: 15px; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--overlay);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-secondary);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border);
  width: 100%;
  max-width: 500px;
  padding: 24px;
  padding-bottom: 40px;
}
.modal h2 { font-size: 20px; text-align: center; margin-bottom: 20px; font-weight: 700; color: var(--text); }
.input-group { margin-bottom: 14px; }
.input-group label {
  display: block;
  font-size: 12px;
  color: var(--text-tertiary);
  margin-bottom: 6px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.input-group input {
  width: 100%;
  padding: 14px;
  font-size: 24px;
  font-weight: 700;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  text-align: center;
  color: var(--text);
  -webkit-appearance: none;
}
.input-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.input-group input::placeholder { color: var(--text-tertiary); }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-actions button {
  flex: 1;
  padding: 15px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}
.btn-cancel { background: var(--bg-card); color: var(--text-secondary); }
.btn-save { background: var(--accent); color: #fff; }
.btn-save:active { opacity: 0.85; }

.quick-fields { display: flex; gap: 8px; }
.quick-fields .input-group { flex: 1; }
.quick-fields input { font-size: 18px; }

/* History View */
.history-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  margin: 0 16px 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.history-item .club-name { font-weight: 700; font-size: 15px; color: var(--text); }
.history-item .shot-data { text-align: right; font-size: 14px; color: var(--text-secondary); }
.history-item .shot-time { font-size: 11px; color: var(--text-tertiary); }
.history-item .delete-btn { color: var(--red); font-size: 13px; cursor: pointer; margin-left: 12px; font-weight: 600; }
.section-label {
  padding: 16px 16px 8px;
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* Buttons */
.export-bar { padding: 16px; }
.btn-export {
  width: 100%;
  padding: 15px;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}
.btn-danger { background: var(--red); color: #fff; margin-top: 8px; }

/* Settings Panel */
.settings-panel {
  display: none;
  padding: 16px;
}
.settings-panel.active { display: block; }
.settings-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 12px;
  overflow: hidden;
}
.settings-section-title {
  padding: 14px 16px 6px;
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.setting-row:last-child { border-bottom: none; }
.setting-row .setting-label { font-size: 15px; color: var(--text); }
.setting-row .setting-label small { display: block; font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
.pill-group {
  display: flex;
  background: var(--bg);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.pill {
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  background: none;
}
.pill.active {
  background: var(--accent);
  color: #fff;
}
</style>
</head>
<body>

<header>
  <h1>SwingTrackr</h1>
  <div class="session-info" id="sessionInfo"></div>
  <button class="settings-toggle" onclick="toggleSettings()" id="settingsBtn">&#9881;</button>
</header>

<div class="tabs" id="tabBar">
  <div class="tab active" data-view="log">Log Shot</div>
  <div class="tab" data-view="stats">Averages</div>
  <div class="tab" data-view="history">History</div>
</div>

<div id="log" class="view active">
  <div class="club-grid" id="clubGrid"></div>
</div>

<div id="stats" class="view">
  <div class="stats-list" id="statsList"></div>
  <div class="export-bar">
    <button class="btn-export" onclick="exportData()">Export Session (Copy)</button>
  </div>
</div>

<div id="history" class="view">
  <div id="historyList"></div>
</div>

<div id="settingsView" class="settings-panel">
  <div class="section-label">Units</div>
  <div class="settings-section">
    <div class="setting-row">
      <div class="setting-label">Distance<small>Carry &amp; total</small></div>
      <div class="pill-group" data-setting="distance">
        <button class="pill" data-value="yds">Yards</button>
        <button class="pill" data-value="m">Meters</button>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-label">Speed<small>Ball &amp; club speed</small></div>
      <div class="pill-group" data-setting="speed">
        <button class="pill" data-value="mph">mph</button>
        <button class="pill" data-value="kph">km/h</button>
      </div>
    </div>
  </div>
  <div class="section-label" style="margin-top:8px">About</div>
  <div class="settings-section">
    <div class="setting-row">
      <div class="setting-label">SwingTrackr<small>Sim session logger</small></div>
      <div style="font-size:13px;color:var(--text-tertiary)">v1.0</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">Log Shot</h2>
    <div class="input-group">
      <label id="labelCarry">Carry Distance (yds)</label>
      <input type="number" id="inputCarry" inputmode="decimal" placeholder="0">
    </div>
    <div class="input-group">
      <label id="labelTotal">Total Distance (yds)</label>
      <input type="number" id="inputTotal" inputmode="decimal" placeholder="0">
    </div>
    <div class="quick-fields">
      <div class="input-group">
        <label id="labelBallSpeed">Ball Speed (mph)</label>
        <input type="number" id="inputBallSpeed" inputmode="decimal" placeholder="—">
      </div>
      <div class="input-group">
        <label id="labelClubSpeed">Club Speed (mph)</label>
        <input type="number" id="inputClubSpeed" inputmode="decimal" placeholder="—">
      </div>
    </div>
    <div class="quick-fields">
      <div class="input-group">
        <label>Launch Angle</label>
        <input type="number" id="inputLaunch" inputmode="decimal" placeholder="—" step="0.1">
      </div>
      <div class="input-group">
        <label>Spin (rpm)</label>
        <input type="number" id="inputSpin" inputmode="decimal" placeholder="—">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveShot()">Save Shot</button>
    </div>
  </div>
</div>

<script>
const CLUBS = [
  { id: 'dr', name: 'Driver', brand: 'TaylorMade' },
  { id: '3w', name: '3 Wood', brand: 'TaylorMade' },
  { id: '4i', name: '4 Iron', brand: 'Mizuno' },
  { id: '5i', name: '5 Iron', brand: 'Mizuno' },
  { id: '6i', name: '6 Iron', brand: 'Mizuno' },
  { id: '7i', name: '7 Iron', brand: 'Mizuno' },
  { id: '8i', name: '8 Iron', brand: 'Mizuno' },
  { id: '9i', name: '9 Iron', brand: 'Mizuno' },
  { id: 'pw', name: 'PW (43)', brand: 'Mizuno' },
  { id: 'gw', name: 'GW (48)', brand: 'Mizuno' },
  { id: 'sw', name: 'SW (54)', brand: 'Mizuno' },
  { id: 'lw', name: 'LW (58)', brand: 'Mizuno' },
];

const STORAGE_KEY = 'swingtrackr_shots';
const SETTINGS_KEY = 'swingtrackr_settings';
let currentClub = null;

function getSettings() {
  return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{"distance":"yds","speed":"mph"}');
}
function saveSetting(key, value) {
  const s = getSettings();
  s[key] = value;
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}
function distUnit() { return getSettings().distance; }
function speedUnit() { return getSettings().speed; }
function distLabel() { return distUnit() === 'yds' ? 'yds' : 'm'; }
function speedLabel() { return speedUnit() === 'mph' ? 'mph' : 'km/h'; }

function getShots() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
}
function saveShots(shots) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(shots));
}

function getClubStats(clubId) {
  const shots = getShots().filter(s => s.clubId === clubId);
  if (!shots.length) return null;
  const avg = (arr, key) => {
    const vals = arr.map(s => s[key]).filter(v => v != null && v > 0);
    return vals.length ? Math.round(vals.reduce((a,b) => a+b, 0) / vals.length) : null;
  };
  const avgDec = (arr, key) => {
    const vals = arr.map(s => s[key]).filter(v => v != null && v > 0);
    return vals.length ? (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1) : null;
  };
  return {
    count: shots.length,
    avgCarry: avg(shots, 'carry'),
    avgTotal: avg(shots, 'total'),
    avgBallSpeed: avg(shots, 'ballSpeed'),
    avgClubSpeed: avg(shots, 'clubSpeed'),
    avgLaunch: avgDec(shots, 'launch'),
    avgSpin: avg(shots, 'spin'),
    shots
  };
}

function renderClubGrid() {
  const grid = document.getElementById('clubGrid');
  const dl = distLabel();
  grid.innerHTML = CLUBS.map(c => {
    const stats = getClubStats(c.id);
    const hasData = stats != null;
    return `<button class="club-btn${hasData ? ' has-data' : ''}" onclick="openModal('${c.id}')">
      ${c.name}<span class="brand">${c.brand}</span>
      ${hasData ? `<div class="avg">${stats.avgCarry || '—'} ${dl}</div><div class="count">${stats.count} shot${stats.count>1?'s':''}</div>` : '<div class="avg" style="color:var(--text-tertiary)">No data</div>'}
    </button>`;
  }).join('');
}

function renderStats() {
  const list = document.getElementById('statsList');
  const clubsWithData = CLUBS.filter(c => getClubStats(c.id));
  const dl = distLabel();
  const sl = speedLabel();
  if (!clubsWithData.length) {
    list.innerHTML = '<div class="no-data">No shots logged yet.<br>Tap a club to start!</div>';
    return;
  }
  list.innerHTML = clubsWithData.map(c => {
    const s = getClubStats(c.id);
    const row = (label, val, unit='') => val != null ? `<div class="stat-row"><span class="label">${label}</span><span>${val}${unit}</span></div>` : '';
    return `<div class="stat-card">
      <h3>${c.name} <span style="font-weight:400;color:var(--text-tertiary);font-size:13px">(${s.count} shots)</span></h3>
      ${row('Avg Carry', s.avgCarry, ' ' + dl)}
      ${row('Avg Total', s.avgTotal, ' ' + dl)}
      ${row('Avg Ball Speed', s.avgBallSpeed, ' ' + sl)}
      ${row('Avg Club Speed', s.avgClubSpeed, ' ' + sl)}
      ${row('Avg Launch', s.avgLaunch, '°')}
      ${row('Avg Spin', s.avgSpin, ' rpm')}
      <div class="shots-list">Carries: ${s.shots.map(x => x.carry || '—').join(', ')}</div>
    </div>`;
  }).join('');
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const shots = getShots().slice().reverse();
  const dl = distLabel();
  const sl = speedLabel();
  if (!shots.length) {
    list.innerHTML = '<div class="no-data">No shots yet.</div>';
    return;
  }
  let html = '';
  let lastDate = '';
  shots.forEach((s, i) => {
    const club = CLUBS.find(c => c.id === s.clubId);
    const d = new Date(s.time);
    const dateStr = d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
    const time = d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
    const realIdx = shots.length - 1 - i;
    if (dateStr !== lastDate) {
      lastDate = dateStr;
      html += `<div class="section-label">${dateStr}</div>`;
    }
    html += `<div class="history-item">
      <div><div class="club-name">${club?.name || s.clubId}</div><div class="shot-time">${time}</div></div>
      <div style="display:flex;align-items:center">
        <div class="shot-data">
          ${s.carry ? s.carry + ' carry' : ''}${s.total ? ' / ' + s.total + ' total' : ''}
          ${s.ballSpeed ? '<br>' + s.ballSpeed + ' ' + sl : ''}
        </div>
        <span class="delete-btn" onclick="deleteShot(${realIdx})">Delete</span>
      </div>
    </div>`;
  });
  list.innerHTML = html;
}

function updateModalLabels() {
  const dl = distLabel();
  const sl = speedLabel();
  document.getElementById('labelCarry').textContent = `Carry Distance (${dl})`;
  document.getElementById('labelTotal').textContent = `Total Distance (${dl})`;
  document.getElementById('labelBallSpeed').textContent = `Ball Speed (${sl})`;
  document.getElementById('labelClubSpeed').textContent = `Club Speed (${sl})`;
}

function openModal(clubId) {
  currentClub = clubId;
  const club = CLUBS.find(c => c.id === clubId);
  document.getElementById('modalTitle').textContent = club.name;
  document.getElementById('inputCarry').value = '';
  document.getElementById('inputTotal').value = '';
  document.getElementById('inputBallSpeed').value = '';
  document.getElementById('inputClubSpeed').value = '';
  document.getElementById('inputLaunch').value = '';
  document.getElementById('inputSpin').value = '';
  updateModalLabels();
  document.getElementById('modal').classList.add('show');
  setTimeout(() => document.getElementById('inputCarry').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  currentClub = null;
}

function saveShot() {
  const carry = parseFloat(document.getElementById('inputCarry').value) || null;
  const total = parseFloat(document.getElementById('inputTotal').value) || null;
  if (!carry && !total) { alert('Enter at least carry or total distance'); return; }
  const shot = {
    clubId: currentClub,
    carry,
    total,
    ballSpeed: parseFloat(document.getElementById('inputBallSpeed').value) || null,
    clubSpeed: parseFloat(document.getElementById('inputClubSpeed').value) || null,
    launch: parseFloat(document.getElementById('inputLaunch').value) || null,
    spin: parseFloat(document.getElementById('inputSpin').value) || null,
    time: new Date().toISOString()
  };
  const shots = getShots();
  shots.push(shot);
  saveShots(shots);
  closeModal();
  renderAll();
}

function deleteShot(idx) {
  const shots = getShots();
  shots.splice(idx, 1);
  saveShots(shots);
  renderAll();
}

function renderAll() {
  renderClubGrid();
  renderStats();
  renderHistory();
  updateSessionInfo();
}

function updateSessionInfo() {
  const shots = getShots();
  document.getElementById('sessionInfo').textContent = shots.length ? `${shots.length} shots logged` : 'Tap a club to log your first shot';
}

function toggleSettings() {
  const panel = document.getElementById('settingsView');
  const views = document.querySelectorAll('.view');
  const tabs = document.querySelectorAll('.tab');
  const isOpen = panel.classList.contains('active');

  if (isOpen) {
    panel.classList.remove('active');
    document.querySelector('.tab.active')?.click() || (document.querySelector('[data-view="log"]').click());
  } else {
    views.forEach(v => v.classList.remove('active'));
    tabs.forEach(t => t.classList.remove('active'));
    panel.classList.add('active');
  }
}

function initSettings() {
  const settings = getSettings();
  document.querySelectorAll('.pill-group').forEach(group => {
    const key = group.dataset.setting;
    group.querySelectorAll('.pill').forEach(pill => {
      pill.classList.toggle('active', pill.dataset.value === settings[key]);
      pill.addEventListener('click', () => {
        group.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        saveSetting(key, pill.dataset.value);
        renderAll();
      });
    });
  });
}

function exportData() {
  const clubsWithData = CLUBS.filter(c => getClubStats(c.id));
  if (!clubsWithData.length) { alert('No data to export'); return; }
  const dl = distLabel();
  const sl = speedLabel();
  let text = 'SwingTrackr Session - ' + new Date().toLocaleDateString() + '\n' + '='.repeat(40) + '\n\n';
  clubsWithData.forEach(c => {
    const s = getClubStats(c.id);
    text += `${c.name} (${s.count} shots)\n`;
    if (s.avgCarry) text += `  Avg Carry: ${s.avgCarry} ${dl}\n`;
    if (s.avgTotal) text += `  Avg Total: ${s.avgTotal} ${dl}\n`;
    if (s.avgBallSpeed) text += `  Avg Ball Speed: ${s.avgBallSpeed} ${sl}\n`;
    if (s.avgClubSpeed) text += `  Avg Club Speed: ${s.avgClubSpeed} ${sl}\n`;
    if (s.avgLaunch) text += `  Avg Launch: ${s.avgLaunch}°\n`;
    if (s.avgSpin) text += `  Avg Spin: ${s.avgSpin} rpm\n`;
    text += `  All carries: ${s.shots.map(x => x.carry || '—').join(', ')}\n\n`;
  });
  navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!')).catch(() => {
    const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); alert('Copied!');
  });
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('settingsView').classList.remove('active');
    tab.classList.add('active');
    document.getElementById(tab.dataset.view).classList.add('active');
  });
});

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

initSettings();
renderAll();
</script>
</body>
</html>
