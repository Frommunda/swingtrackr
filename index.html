<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f0a">
<title>SwingTrackr</title>
<style>
@keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes slideDown { from { transform: translateY(0); } to { transform: translateY(100%); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
@keyframes barGrow { from { width: 0; } }
@keyframes cardPop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes checkPop { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

:root {
  --bg: #0a0f0a;
  --bg-secondary: #111a11;
  --bg-card: rgba(26, 38, 26, 0.7);
  --bg-card-solid: #1a261a;
  --bg-card-hover: rgba(34, 50, 34, 0.8);
  --bg-input: rgba(16, 24, 16, 0.9);
  --text: #f0f4f0;
  --text-secondary: rgba(240, 244, 240, 0.75);
  --text-tertiary: rgba(240, 244, 240, 0.35);
  --accent: #4ade80;
  --accent-dim: rgba(74, 222, 128, 0.12);
  --accent-mid: rgba(74, 222, 128, 0.25);
  --red: #f87171;
  --orange: #fb923c;
  --yellow: #fbbf24;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --border: rgba(74, 222, 128, 0.08);
  --border-light: rgba(74, 222, 128, 0.15);
  --overlay: rgba(0,0,0,0.7);
  --gradient-card: linear-gradient(135deg, rgba(26,38,26,0.8) 0%, rgba(16,28,16,0.6) 100%);
  --gradient-header: linear-gradient(160deg, #0f1a0f 0%, #162016 40%, #0a140a 100%);
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 500px;
  margin: 0 auto;
  padding-bottom: 100px;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

/* ── Header ── */
header {
  background: var(--gradient-header);
  padding: 20px 20px 16px;
  position: sticky;
  top: 0;
  z-index: 20;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}
.header-row { display: flex; justify-content: space-between; align-items: center; }
header h1 {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--accent);
}
.header-subtitle { font-size: 13px; color: var(--text-tertiary); margin-top: 2px; letter-spacing: 0.3px; }
.settings-toggle {
  width: 40px; height: 40px; border-radius: 12px; background: var(--bg-card);
  border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; color: var(--text-secondary);
  transition: all 0.2s;
}
.settings-toggle:active { transform: scale(0.92); background: var(--bg-card-hover); }

/* ── Tabs ── */
.tabs {
  display: flex; gap: 4px; padding: 12px 20px;
  background: var(--bg); position: sticky; top: 72px; z-index: 15;
}
.tab {
  flex: 1; text-align: center; padding: 10px 6px; font-size: 13px; font-weight: 600;
  color: var(--text-tertiary); cursor: pointer; border-radius: var(--radius-sm);
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  letter-spacing: 0.3px;
}
.tab.active {
  color: var(--bg);
  background: var(--accent);
  box-shadow: 0 4px 20px rgba(74, 222, 128, 0.25);
}
.tab:not(.active):active { background: var(--accent-dim); color: var(--text-secondary); }

/* ── Views ── */
.view { display: none; }
.view.active { display: block; animation: fadeIn 0.25s ease; }

/* ── Club Grid ── */
.club-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 8px 20px 20px; }
.club-btn {
  background: var(--gradient-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 14px;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(8px);
  position: relative;
  overflow: hidden;
  animation: fadeInUp 0.35s ease both;
}
.club-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 80% 20%, var(--accent-dim), transparent 70%);
  opacity: 0;
  transition: opacity 0.3s;
}
.club-btn:active { transform: scale(0.97); }
.club-btn:active::before { opacity: 1; }
.club-btn .brand { font-size: 12px; font-weight: 500; color: var(--text-tertiary); display: block; margin-top: 4px; }
.club-btn .avg { font-size: 14px; color: var(--accent); margin-top: 10px; font-weight: 700; }
.club-btn .count { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
.club-btn.has-data { border-color: var(--border-light); }
.club-btn.has-data::after {
  content: '';
  position: absolute;
  top: 12px; right: 12px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}
.club-grid .club-btn:nth-child(1) { animation-delay: 0.02s; }
.club-grid .club-btn:nth-child(2) { animation-delay: 0.04s; }
.club-grid .club-btn:nth-child(3) { animation-delay: 0.06s; }
.club-grid .club-btn:nth-child(4) { animation-delay: 0.08s; }
.club-grid .club-btn:nth-child(5) { animation-delay: 0.10s; }
.club-grid .club-btn:nth-child(6) { animation-delay: 0.12s; }
.club-grid .club-btn:nth-child(7) { animation-delay: 0.14s; }
.club-grid .club-btn:nth-child(8) { animation-delay: 0.16s; }
.club-grid .club-btn:nth-child(9) { animation-delay: 0.18s; }
.club-grid .club-btn:nth-child(10) { animation-delay: 0.20s; }
.club-grid .club-btn:nth-child(11) { animation-delay: 0.22s; }
.club-grid .club-btn:nth-child(12) { animation-delay: 0.24s; }

/* ── Stat Cards ── */
.stats-list { padding: 8px 20px 20px; }
.stat-card {
  background: var(--gradient-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  backdrop-filter: blur(8px);
  animation: fadeInUp 0.35s ease both;
}
.stat-card-header {
  padding: 18px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  transition: background 0.2s;
}
.stat-card-header:active { background: var(--accent-dim); }
.stat-card-header h3 { font-size: 17px; font-weight: 700; color: var(--text); }
.stat-card-header .club-avg { font-size: 15px; color: var(--accent); font-weight: 700; }
.stat-card-header .chevron {
  font-size: 12px; color: var(--text-tertiary);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  margin-left: 8px;
}
.stat-card-header .chevron.open { transform: rotate(90deg); }
.stat-card-body {
  padding: 0 18px;
  max-height: 0; overflow: hidden;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), padding 0.35s;
}
.stat-card-body.open { max-height: 2600px; padding-bottom: 18px; }
.stat-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 14px; padding: 7px 0; color: var(--text-secondary);
}
.stat-row .label { color: var(--text-tertiary); font-size: 13px; }
.stat-row .val { font-weight: 600; }
.stat-row .highlight { color: var(--accent); }
.stat-row .warn { color: var(--orange); }
.stat-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.shots-header {
  font-size: 11px; color: var(--text-tertiary); font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
}
.shot-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px; margin-bottom: 6px;
  background: var(--bg-input); border-radius: var(--radius-sm);
  transition: all 0.2s;
}
.shot-item:active { background: var(--bg-card-hover); }
.shot-num {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--accent-dim); color: var(--accent);
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.shot-detail { flex: 1; font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.shot-detail .primary { color: var(--text); font-weight: 600; }
.shot-note { font-size: 11px; color: var(--text-tertiary); font-style: italic; margin-top: 3px; }
.shot-shape-tag {
  font-size: 10px; padding: 3px 8px; border-radius: 6px;
  background: var(--accent-dim); color: var(--accent);
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  flex-shrink: 0;
}
.delete-btn {
  color: var(--red); font-size: 12px; cursor: pointer; font-weight: 600;
  padding: 6px 10px; border-radius: 8px; transition: all 0.15s;
  flex-shrink: 0; opacity: 0.6;
}
.delete-btn:active { background: rgba(248,113,113,0.15); opacity: 1; }
.no-data { text-align: center; color: var(--text-tertiary); padding: 60px 20px; font-size: 15px; line-height: 1.6; }

/* ── Visualizations ── */
.viz-title {
  font-size: 11px; color: var(--text-tertiary); font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 12px;
  display: flex; justify-content: space-between; align-items: baseline;
}
.viz-title .viz-sub { color: var(--text-secondary); font-weight: 600; letter-spacing: 0; text-transform: none; font-size: 12px; }
/* Dispersion strip */
.disp-track {
  position: relative; height: 40px; margin: 0 4px 6px;
  border-radius: 8px;
  background: linear-gradient(90deg, rgba(248,113,113,0.06), rgba(74,222,128,0.12), rgba(248,113,113,0.06));
}
.disp-mean {
  position: absolute; top: -3px; bottom: -3px; width: 2px;
  background: var(--accent); border-radius: 2px; transform: translateX(-1px);
  box-shadow: 0 0 8px var(--accent-mid);
}
.disp-dot {
  position: absolute; top: 50%; width: 11px; height: 11px; border-radius: 50%;
  background: var(--accent); transform: translate(-50%, -50%);
  border: 1.5px solid var(--bg-secondary); opacity: 0.85;
  animation: cardPop 0.4s ease both;
}
.disp-scale { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-tertiary); padding: 0 2px; }
.disp-scale .mean-label { color: var(--accent); font-weight: 700; }
/* Shape distribution */
.shape-bar {
  display: flex; height: 12px; border-radius: 6px; overflow: hidden;
  background: var(--bg-input); margin-bottom: 10px;
}
.shape-seg { height: 100%; transition: width 0.4s; }
.shape-legend { display: flex; flex-wrap: wrap; gap: 6px 14px; }
.shape-legend span { font-size: 11px; color: var(--text-secondary); display: inline-flex; align-items: center; gap: 5px; }
.shape-dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }

/* ── Gapping ── */
.gap-chart { padding: 8px 20px 20px; }
.gap-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; animation: fadeInUp 0.4s ease both; }
.gap-bar-label { width: 56px; font-size: 13px; font-weight: 700; color: var(--text-secondary); flex-shrink: 0; white-space: nowrap; }
.gap-bar-track {
  flex: 1; height: 34px; background: var(--bg-card-solid); border-radius: 10px;
  position: relative; overflow: hidden; border: 1px solid var(--border);
}
.gap-bar-fill {
  height: 100%; border-radius: 9px; min-width: 4px;
  animation: barGrow 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
}
.gap-bar-value {
  width: 56px; text-align: right; flex-shrink: 0;
  font-size: 14px; font-weight: 700; color: var(--text);
  font-variant-numeric: tabular-nums;
}
.gap-bar-value small { font-size: 10px; color: var(--text-tertiary); font-weight: 600; margin-left: 2px; }
.gap-bar-gap {
  width: 38px; text-align: right; font-size: 12px; font-weight: 700;
  color: var(--text-tertiary); flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.rec-card {
  background: var(--gradient-card); border: 1px solid var(--border-light);
  border-radius: var(--radius); padding: 16px; margin-top: 8px;
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  animation: fadeInUp 0.4s ease both;
}
.rec-card .rec-icon { font-size: 16px; margin-right: 6px; }
.gap-ok {
  text-align: center; padding: 20px; font-size: 14px; color: var(--accent); font-weight: 600;
  animation: checkPop 0.4s ease both;
}

/* ── Sessions / History ── */
.session-card {
  background: var(--gradient-card); border: 1px solid var(--border);
  border-radius: var(--radius); margin: 0 20px 12px; overflow: hidden;
  backdrop-filter: blur(8px); animation: fadeInUp 0.35s ease both;
}
.session-header {
  padding: 16px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  transition: background 0.2s;
}
.session-header:active { background: var(--accent-dim); }
.session-date { font-weight: 700; font-size: 16px; color: var(--text); }
.session-meta { font-size: 12px; color: var(--text-tertiary); margin-top: 3px; }
.session-header .chevron { font-size: 12px; color: var(--text-tertiary); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
.session-header .chevron.open { transform: rotate(90deg); }
.session-shots { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
.session-shots.open { max-height: 3000px; }
.session-shots-inner { padding: 0 18px 14px; }
.session-shot {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; margin-bottom: 6px;
  background: var(--bg-input); border-radius: var(--radius-sm);
  font-size: 13px;
}
.ss-club { font-weight: 700; color: var(--text); min-width: 52px; }
.ss-data { flex: 1; color: var(--text-secondary); }
.ss-time { font-size: 11px; color: var(--text-tertiary); flex-shrink: 0; }

/* ── Swipe to delete ── */
.swipe-row {
  position: relative; overflow: hidden;
  border-radius: var(--radius-sm); margin-bottom: 6px;
  background: var(--red);
}
.swipe-delete {
  position: absolute; top: 0; right: 0; bottom: 0; width: 92px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: 700; letter-spacing: 0.3px;
  cursor: pointer; background: var(--red);
}
.swipe-delete::before {
  content: '✕'; margin-right: 6px; font-size: 12px;
}
.swipe-content {
  position: relative; z-index: 1; margin-bottom: 0 !important;
  border-radius: var(--radius-sm);
  background: #16221a;
  transform: translateX(0);
  transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
  touch-action: pan-y;
}
.swipe-content.dragging { transition: none; }
.swipe-content.revealed { transform: translateX(-92px); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: var(--overlay); z-index: 100;
  align-items: flex-end; justify-content: center;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.modal-overlay.show { display: flex; }
.modal-overlay.show .modal-bg { animation: fadeIn 0.2s ease; }
.modal-overlay.show .modal { animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1); }
.modal-overlay.closing .modal { animation: slideDown 0.25s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
.modal-overlay.closing .modal-bg { animation: fadeOut 0.25s ease forwards; }
.modal-bg { position: absolute; inset: 0; }
.modal {
  background: var(--bg-secondary); border-radius: 24px 24px 0 0;
  border-top: 1px solid var(--border-light);
  width: 100%; max-width: 500px; padding: 8px 24px 40px;
  max-height: 92vh; overflow-y: auto;
  position: relative; z-index: 1;
}
.modal-handle {
  width: 36px; height: 4px; background: var(--text-tertiary); border-radius: 2px;
  margin: 8px auto 20px;
}
.modal h2 {
  font-size: 22px; text-align: center; margin-bottom: 24px;
  font-weight: 800; letter-spacing: -0.3px; color: var(--text);
}
.input-group { margin-bottom: 16px; }
.input-group label {
  display: block; font-size: 11px; color: var(--text-tertiary); margin-bottom: 8px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
}
.input-group input, .input-group select {
  width: 100%; padding: 16px; font-size: 28px; font-weight: 800;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 14px; text-align: center; color: var(--text);
  -webkit-appearance: none; appearance: none;
  transition: all 0.2s;
}
.input-group input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-dim), 0 0 24px var(--accent-dim);
}
.input-group input::placeholder { color: var(--text-tertiary); font-weight: 600; }
.input-group input[type=number]::-webkit-inner-spin-button,
.input-group input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.input-group input[type=number] { -moz-appearance: textfield; }
.quick-fields { display: flex; gap: 10px; }
.quick-fields .input-group { flex: 1; }
.quick-fields input { font-size: 20px; padding: 14px 10px; }

.shape-picker { display: flex; gap: 6px; flex-wrap: wrap; }
.shape-btn {
  padding: 10px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-input); color: var(--text-tertiary);
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
}
.shape-btn:active { transform: scale(0.95); }
.shape-btn.active {
  background: var(--accent-dim); color: var(--accent);
  border-color: var(--accent); box-shadow: 0 0 12px var(--accent-dim);
}
.notes-input {
  font-size: 15px !important; font-weight: 500 !important;
  text-align: left !important; padding: 14px 16px !important;
}

.modal-actions { display: flex; gap: 10px; margin-top: 24px; }
.modal-actions button {
  flex: 1; padding: 17px; border: none; border-radius: 14px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  transition: all 0.15s;
}
.btn-cancel {
  background: var(--bg-card); color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-cancel:active { background: var(--bg-card-hover); }
.btn-save {
  background: var(--accent); color: #0a0f0a;
  box-shadow: 0 4px 20px rgba(74, 222, 128, 0.3);
}
.btn-save:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(74, 222, 128, 0.2); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--accent); color: #0a0f0a; padding: 14px 28px;
  border-radius: 14px; font-size: 14px; font-weight: 700; z-index: 200;
  box-shadow: 0 8px 32px rgba(74,222,128,0.3);
  transition: transform 0.35s cubic-bezier(0.32,0.72,0,1), opacity 0.35s;
  opacity: 0; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── Export ── */
.export-bar { padding: 8px 20px 20px; }
.btn-export {
  width: 100%; padding: 17px; border: 1px solid var(--border-light);
  background: var(--gradient-card); color: var(--accent);
  border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; backdrop-filter: blur(8px);
}
.btn-export:active { transform: scale(0.98); background: var(--accent-dim); }

/* ── Settings ── */
.settings-panel { display: none; padding: 8px 20px 20px; }
.settings-panel.active { display: block; animation: fadeIn 0.25s ease; }
.settings-section {
  background: var(--gradient-card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 12px;
  backdrop-filter: blur(8px);
}
.setting-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 18px; border-bottom: 1px solid var(--border);
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 15px; font-weight: 600; color: var(--text); }
.setting-label small { display: block; font-size: 12px; color: var(--text-tertiary); margin-top: 3px; font-weight: 400; }
.pill-group {
  display: flex; background: var(--bg-input); border-radius: var(--radius-sm);
  overflow: hidden; border: 1px solid var(--border); padding: 3px;
}
.pill {
  padding: 8px 16px; font-size: 13px; font-weight: 600; color: var(--text-tertiary);
  cursor: pointer; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  border: none; background: none; border-radius: 7px;
}
.pill.active { background: var(--accent); color: #0a0f0a; box-shadow: 0 2px 8px rgba(74,222,128,0.2); }
.section-label {
  padding: 20px 20px 10px; font-size: 11px; color: var(--text-tertiary);
  font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;
}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>SwingTrackr</h1>
      <div class="header-subtitle" id="sessionInfo"></div>
    </div>
    <button class="settings-toggle" onclick="toggleSettings()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</header>

<div class="tabs" id="tabBar">
  <div class="tab active" data-view="log">Log</div>
  <div class="tab" data-view="stats">Averages</div>
  <div class="tab" data-view="gapping">Gapping</div>
  <div class="tab" data-view="history">Sessions</div>
</div>

<div id="log" class="view active">
  <div class="club-grid" id="clubGrid"></div>
</div>

<div id="stats" class="view">
  <div class="stats-list" id="statsList"></div>
  <div class="export-bar">
    <button class="btn-export" onclick="exportData()">Export All Data</button>
  </div>
</div>

<div id="gapping" class="view">
  <div class="section-label">Club Gapping &mdash; Avg Carry</div>
  <div class="gap-chart" id="gapChart"></div>
</div>

<div id="history" class="view">
  <div id="historyList"></div>
</div>

<div id="settingsView" class="settings-panel">
  <div class="section-label">Units</div>
  <div class="settings-section">
    <div class="setting-row">
      <div class="setting-label">Distance<small>Carry &amp; total</small></div>
      <div class="pill-group" data-setting="distance">
        <button class="pill" data-value="yds">Yards</button>
        <button class="pill" data-value="m">Meters</button>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-label">Speed<small>Ball &amp; club speed</small></div>
      <div class="pill-group" data-setting="speed">
        <button class="pill" data-value="mph">mph</button>
        <button class="pill" data-value="kph">km/h</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Log Shot</h2>
    <div class="input-group">
      <label id="labelCarry">Carry Distance</label>
      <input type="number" id="inputCarry" inputmode="decimal" placeholder="0">
    </div>
    <div class="input-group">
      <label id="labelTotal">Total Distance</label>
      <input type="number" id="inputTotal" inputmode="decimal" placeholder="0">
    </div>
    <div class="quick-fields">
      <div class="input-group">
        <label id="labelBallSpeed">Ball Speed</label>
        <input type="number" id="inputBallSpeed" inputmode="decimal" placeholder="—">
      </div>
      <div class="input-group">
        <label id="labelClubSpeed">Club Speed</label>
        <input type="number" id="inputClubSpeed" inputmode="decimal" placeholder="—">
      </div>
    </div>
    <div class="quick-fields">
      <div class="input-group">
        <label>Launch Angle</label>
        <input type="number" id="inputLaunch" inputmode="decimal" placeholder="—" step="0.1">
      </div>
      <div class="input-group">
        <label>Spin (rpm)</label>
        <input type="number" id="inputSpin" inputmode="decimal" placeholder="—">
      </div>
    </div>
    <div class="input-group">
      <label>Shot Shape</label>
      <div class="shape-picker" id="shapePicker">
        <button class="shape-btn" data-shape="straight">Straight</button>
        <button class="shape-btn" data-shape="draw">Draw</button>
        <button class="shape-btn" data-shape="fade">Fade</button>
        <button class="shape-btn" data-shape="hook">Hook</button>
        <button class="shape-btn" data-shape="slice">Slice</button>
        <button class="shape-btn" data-shape="pull">Pull</button>
        <button class="shape-btn" data-shape="push">Push</button>
      </div>
    </div>
    <div class="input-group">
      <label>Notes</label>
      <input type="text" id="inputNotes" class="notes-input" placeholder="Swing thought, miss, etc.">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveShot()">Save Shot</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CLUBS = [
  { id: 'dr', name: 'Driver', brand: 'TaylorMade' },
  { id: '3w', name: '3 Wood', brand: 'TaylorMade' },
  { id: '4i', name: '4 Iron', brand: 'Mizuno' },
  { id: '5i', name: '5 Iron', brand: 'Mizuno' },
  { id: '6i', name: '6 Iron', brand: 'Mizuno' },
  { id: '7i', name: '7 Iron', brand: 'Mizuno' },
  { id: '8i', name: '8 Iron', brand: 'Mizuno' },
  { id: '9i', name: '9 Iron', brand: 'Mizuno' },
  { id: 'pw', name: 'PW (43)', brand: 'Mizuno' },
  { id: 'gw', name: 'GW (48)', brand: 'Mizuno' },
  { id: 'sw', name: 'SW (54)', brand: 'Mizuno' },
  { id: 'lw', name: 'LW (58)', brand: 'Mizuno' },
];

const STORAGE_KEY = 'swingtrackr_shots';
const SETTINGS_KEY = 'swingtrackr_settings';
let currentClub = null;
let selectedShape = null;
let expandedCards = {};
let expandedSessions = {};

function getSettings() { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{"distance":"yds","speed":"mph"}'); }
function saveSetting(k, v) { const s = getSettings(); s[k] = v; localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }
function dl() { return getSettings().distance === 'yds' ? 'yds' : 'm'; }
function sl() { return getSettings().speed === 'mph' ? 'mph' : 'km/h'; }
function getShots() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
function saveShots(shots) { localStorage.setItem(STORAGE_KEY, JSON.stringify(shots)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function getClubStats(clubId) {
  const shots = getShots().filter(s => s.clubId === clubId);
  if (!shots.length) return null;
  const vals = (key) => shots.map(s => s[key]).filter(v => v != null && v > 0);
  const avg = (key) => { const v = vals(key); return v.length ? Math.round(v.reduce((a,b) => a+b, 0) / v.length) : null; };
  const avgDec = (key) => { const v = vals(key); return v.length ? (v.reduce((a,b) => a+b, 0) / v.length).toFixed(1) : null; };
  const stdDev = (key) => {
    const v = vals(key);
    if (v.length < 2) return null;
    const mean = v.reduce((a,b) => a+b, 0) / v.length;
    return Math.round(Math.sqrt(v.reduce((sum, x) => sum + (x - mean) ** 2, 0) / v.length));
  };
  const carryVals = vals('carry');
  const smashVals = shots.filter(s => s.ballSpeed > 0 && s.clubSpeed > 0).map(s => s.ballSpeed / s.clubSpeed);
  const shapes = shots.map(s => s.shape).filter(Boolean);
  const shapeCounts = {};
  shapes.forEach(s => { shapeCounts[s] = (shapeCounts[s] || 0) + 1; });
  const dominantShape = Object.entries(shapeCounts).sort((a,b) => b[1] - a[1])[0];
  return {
    count: shots.length, avgCarry: avg('carry'), avgTotal: avg('total'),
    avgBallSpeed: avg('ballSpeed'), avgClubSpeed: avg('clubSpeed'),
    avgLaunch: avgDec('launch'), avgSpin: avg('spin'),
    dispersion: stdDev('carry'),
    longest: carryVals.length ? Math.max(...carryVals) : null,
    shortest: carryVals.length ? Math.min(...carryVals) : null,
    smashFactor: smashVals.length ? (smashVals.reduce((a,b) => a+b, 0) / smashVals.length).toFixed(2) : null,
    dominantShape: dominantShape ? dominantShape[0] : null,
    shots
  };
}

const SHAPE_COLORS = {
  straight: '#4ade80', draw: '#60a5fa', fade: '#a78bfa',
  hook: '#f87171', slice: '#fb923c', pull: '#fbbf24', push: '#22d3ee'
};

function buildDispersionViz(stats, d) {
  const carries = stats.shots.map(s => s.carry).filter(v => v != null && v > 0);
  if (carries.length < 2) return '';
  const min = Math.min(...carries), max = Math.max(...carries);
  const mean = stats.avgCarry;
  const range = max - min || 1;
  // 6% inset on each side so edge dots aren't clipped
  const pos = v => (6 + ((v - min) / range) * 88).toFixed(1);
  const dots = carries.map((v, i) =>
    `<div class="disp-dot" style="left:${pos(v)}%;animation-delay:${i*0.03}s"></div>`).join('');
  const meanLine = `<div class="disp-mean" style="left:${pos(mean)}%"></div>`;
  const tight = stats.dispersion <= 6;
  return `<div class="viz-title">Consistency
      <span class="viz-sub" style="color:${tight?'var(--accent)':stats.dispersion>10?'var(--orange)':'var(--text-secondary)'}">
        ±${stats.dispersion} ${d} ${tight?'· tight':stats.dispersion>10?'· loose':''}</span></div>
    <div class="disp-track">${meanLine}${dots}</div>
    <div class="disp-scale"><span>${min} ${d}</span><span class="mean-label">avg ${mean}</span><span>${max} ${d}</span></div>`;
}

function buildShapeViz(stats) {
  const shapes = stats.shots.map(s => s.shape).filter(Boolean);
  if (!shapes.length) return '';
  const counts = {};
  shapes.forEach(s => counts[s] = (counts[s] || 0) + 1);
  const order = ['straight','draw','fade','pull','push','hook','slice'];
  const entries = order.filter(k => counts[k]).map(k => [k, counts[k]]);
  const total = shapes.length;
  const segs = entries.map(([k, n]) =>
    `<div class="shape-seg" style="width:${(n/total*100).toFixed(1)}%;background:${SHAPE_COLORS[k]}"></div>`).join('');
  const legend = entries.map(([k, n]) =>
    `<span><span class="shape-dot" style="background:${SHAPE_COLORS[k]}"></span>${k} ${Math.round(n/total*100)}%</span>`).join('');
  return `<div class="viz-title">Shot Shapes <span class="viz-sub">${total} tracked</span></div>
    <div class="shape-bar">${segs}</div>
    <div class="shape-legend">${legend}</div>`;
}

function renderClubGrid() {
  document.getElementById('clubGrid').innerHTML = CLUBS.map(c => {
    const s = getClubStats(c.id);
    return `<button class="club-btn${s ? ' has-data' : ''}" onclick="openModal('${c.id}')">
      ${c.name}<span class="brand">${c.brand}</span>
      ${s ? `<div class="avg">${s.avgCarry || '—'} ${dl()}</div><div class="count">${s.count} shot${s.count>1?'s':''}</div>` : `<div class="avg" style="color:var(--text-tertiary)">Tap to log</div>`}
    </button>`;
  }).join('');
}

function renderStats() {
  const list = document.getElementById('statsList');
  const clubs = CLUBS.filter(c => getClubStats(c.id));
  if (!clubs.length) { list.innerHTML = '<div class="no-data">No shots logged yet.<br>Tap a club to start!</div>'; return; }
  const d = dl(), s_ = sl();
  list.innerHTML = clubs.map(c => {
    const s = getClubStats(c.id);
    const open = expandedCards[c.id];
    const row = (l, v, u='', cls='') => v != null ? `<div class="stat-row"><span class="label">${l}</span><span class="val ${cls}">${v}${u}</span></div>` : '';
    return `<div class="stat-card">
      <div class="stat-card-header" onclick="toggleCard('${c.id}')">
        <h3>${c.name} <span style="font-weight:400;color:var(--text-tertiary);font-size:13px">· ${s.count}</span></h3>
        <div><span class="club-avg">${s.avgCarry || '—'} ${d}</span><span class="chevron ${open?'open':''}"> &#9656;</span></div>
      </div>
      <div class="stat-card-body ${open?'open':''}">
        ${row('Avg Carry', s.avgCarry, ' '+d)}
        ${row('Avg Total', s.avgTotal, ' '+d)}
        ${row('Longest', s.longest, ' '+d, 'highlight')}
        ${row('Shortest', s.shortest, ' '+d)}
        ${s.dispersion != null ? row('Dispersion', '±'+s.dispersion, ' '+d, s.dispersion > 10 ? 'warn' : 'highlight') : ''}
        ${row('Ball Speed', s.avgBallSpeed, ' '+s_)}
        ${row('Club Speed', s.avgClubSpeed, ' '+s_)}
        ${row('Smash Factor', s.smashFactor, '', s.smashFactor >= 1.45 ? 'highlight' : '')}
        ${row('Launch', s.avgLaunch, '°')}
        ${row('Spin', s.avgSpin != null ? s.avgSpin.toLocaleString() : null, ' rpm')}
        ${s.dominantShape ? row('Tendency', s.dominantShape, '') : ''}
        ${buildDispersionViz(s, d)}
        ${buildShapeViz(s)}
        <div class="stat-divider"></div>
        <div class="shots-header">Individual Shots <span style="float:right;text-transform:none;letter-spacing:0;font-weight:500;opacity:0.7">swipe to delete</span></div>
        ${s.shots.map((shot, i) => {
          const allShots = getShots();
          const realIdx = allShots.findIndex(x => x.time === shot.time && x.clubId === shot.clubId);
          const sf = (shot.ballSpeed && shot.clubSpeed) ? (shot.ballSpeed / shot.clubSpeed).toFixed(2) : null;
          return `<div class="swipe-row">
            <div class="swipe-delete" onclick="deleteShot(${realIdx})">Delete</div>
            <div class="shot-item swipe-content" data-idx="${realIdx}">
              <span class="shot-num">${i+1}</span>
              <div class="shot-detail">
                <span class="primary">${shot.carry ? shot.carry+' '+d : ''}${shot.total ? ' / '+shot.total+' total' : ''}</span>
                ${shot.ballSpeed ? '<br>'+shot.ballSpeed+' '+s_ : ''}${sf ? ' · SF '+sf : ''}
                ${shot.notes ? '<div class="shot-note">'+shot.notes+'</div>' : ''}
              </div>
              ${shot.shape ? '<span class="shot-shape-tag">'+shot.shape+'</span>' : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) { expandedCards[id] = !expandedCards[id]; renderStats(); }

function renderGapping() {
  const chart = document.getElementById('gapChart');
  const d = dl();
  const clubs = CLUBS.map(c => ({ ...c, stats: getClubStats(c.id) })).filter(c => c.stats?.avgCarry);
  if (clubs.length < 2) { chart.innerHTML = '<div class="no-data">Log at least 2 clubs to see gapping.</div>'; return; }
  const max = Math.max(...clubs.map(c => c.stats.avgCarry));
  const gradients = [
    'linear-gradient(90deg,#22c55e,#4ade80)','linear-gradient(90deg,#16a34a,#22c55e)',
    'linear-gradient(90deg,#15803d,#16a34a)','linear-gradient(90deg,#166534,#15803d)',
    'linear-gradient(90deg,#14532d,#166534)','linear-gradient(90deg,#134e29,#14532d)',
    'linear-gradient(90deg,#0f4025,#134e29)','linear-gradient(90deg,#0b3520,#0f4025)',
    'linear-gradient(90deg,#082b1a,#0b3520)','linear-gradient(90deg,#062215,#082b1a)',
    'linear-gradient(90deg,#041a10,#062215)','linear-gradient(90deg,#03120b,#041a10)',
  ];
  const IDEAL_GAP = d === 'yds' ? 12 : 11;
  const GAP_WARN = IDEAL_GAP * 2;

  let html = clubs.map((c, i) => {
    const pct = +(c.stats.avgCarry / max * 100).toFixed(1);
    const gap = i > 0 ? clubs[i-1].stats.avgCarry - c.stats.avgCarry : null;
    const gapColor = gap != null ? (gap > GAP_WARN ? 'var(--red)' : gap > IDEAL_GAP + 4 ? 'var(--orange)' : 'var(--text-tertiary)') : '';
    const short = c.name.replace(' Iron','i').replace(' Wood','w').replace('Driver','Dr');
    return `<div class="gap-bar-row" style="animation-delay:${i*0.05}s">
      <span class="gap-bar-label">${short}</span>
      <div class="gap-bar-track">
        <div class="gap-bar-fill" style="width:${pct}%;background:${gradients[i%gradients.length]};animation-delay:${i*0.06}s"></div>
      </div>
      <span class="gap-bar-value">${c.stats.avgCarry}<small>${d}</small></span>
      <span class="gap-bar-gap" style="color:${gapColor}">${gap != null ? (gap >= 0 ? '+' : '') + gap : ''}</span>
    </div>`;
  }).join('');

  const recs = [];
  for (let i = 1; i < clubs.length; i++) {
    const gap = clubs[i-1].stats.avgCarry - clubs[i].stats.avgCarry;
    if (gap > GAP_WARN) {
      const mid = Math.round(clubs[i].stats.avgCarry + gap / 2);
      const u = clubs[i-1].name.replace(' Iron','i').replace(' Wood','w').replace('Driver','Dr');
      const l = clubs[i].name.replace(' Iron','i').replace(' Wood','w').replace('Driver','Dr');
      if (gap > 40 && clubs[i-1].id === 'dr') {
        recs.push(`<span class="rec-icon">&#9889;</span> Consider a <strong>fairway wood</strong> or <strong>driving iron</strong> for the ${gap} ${d} gap between ${u} and ${l}. Target: ~${mid} ${d}.`);
      } else if (gap > 40) {
        recs.push(`<span class="rec-icon">&#9889;</span> A <strong>hybrid</strong> or <strong>utility iron</strong> would cover the ${gap} ${d} gap between ${u} and ${l}. Target: ~${mid} ${d}.`);
      } else {
        recs.push(`<span class="rec-icon">&#9889;</span> ${gap} ${d} gap between ${u} and ${l} is wide. Consider an additional club around ${mid} ${d}.`);
      }
    }
  }

  if (recs.length) {
    html += `<div class="section-label" style="padding-left:0">Recommendations</div>` +
      recs.map(r => `<div class="rec-card">${r}</div>`).join('');
  } else if (clubs.length >= 4) {
    html += `<div class="gap-ok">&#10003; Your gapping looks solid</div>`;
  }
  chart.innerHTML = html;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const shots = getShots();
  const d = dl(), s_ = sl();
  if (!shots.length) { list.innerHTML = '<div class="no-data">No sessions yet.</div>'; return; }

  const sessions = [];
  let cur = null;
  const GAP = 2 * 60 * 60 * 1000;
  shots.forEach((s, idx) => {
    const t = new Date(s.time).getTime();
    if (!cur || t - cur.lastTime > GAP) { cur = { date: s.time, shots: [], indices: [], lastTime: t }; sessions.push(cur); }
    cur.shots.push(s); cur.indices.push(idx); cur.lastTime = t;
  });

  list.innerHTML = sessions.reverse().map((sess, si) => {
    const dt = new Date(sess.date);
    const dateStr = dt.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
    const t1 = new Date(sess.date).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
    const t2 = new Date(sess.shots[sess.shots.length-1].time).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
    const clubsHit = [...new Set(sess.shots.map(s => s.clubId))].length;
    const open = expandedSessions[si];
    return `<div class="session-card" style="animation-delay:${si*0.05}s">
      <div class="session-header" onclick="toggleSession(${si})">
        <div>
          <div class="session-date">${dateStr}</div>
          <div class="session-meta">${t1} – ${t2} · ${sess.shots.length} shots · ${clubsHit} clubs</div>
        </div>
        <span class="chevron ${open?'open':''}">&#9656;</span>
      </div>
      <div class="session-shots ${open?'open':''}">
        <div class="session-shots-inner">
        ${sess.shots.map((s, j) => {
          const club = CLUBS.find(c => c.id === s.clubId);
          const time = new Date(s.time).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
          return `<div class="swipe-row">
            <div class="swipe-delete" onclick="deleteShot(${sess.indices[j]})">Delete</div>
            <div class="session-shot swipe-content" data-idx="${sess.indices[j]}">
              <span class="ss-club">${club?.name.replace(' Iron','i').replace(' Wood','w') || s.clubId}</span>
              <span class="ss-data">${s.carry ? s.carry+' '+d : ''}${s.total ? ' / '+s.total : ''} ${s.shape ? '<span style="color:var(--text-tertiary)">'+s.shape+'</span>' : ''}</span>
              <span class="ss-time">${time}</span>
            </div>
          </div>`;
        }).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleSession(i) { expandedSessions[i] = !expandedSessions[i]; renderHistory(); }

function updateModalLabels() {
  document.getElementById('labelCarry').textContent = 'Carry Distance (' + dl() + ')';
  document.getElementById('labelTotal').textContent = 'Total Distance (' + dl() + ')';
  document.getElementById('labelBallSpeed').textContent = 'Ball Speed (' + sl() + ')';
  document.getElementById('labelClubSpeed').textContent = 'Club Speed (' + sl() + ')';
}

function openModal(clubId) {
  currentClub = clubId;
  selectedShape = null;
  document.getElementById('modalTitle').textContent = CLUBS.find(c => c.id === clubId).name;
  ['inputCarry','inputTotal','inputBallSpeed','inputClubSpeed','inputLaunch','inputSpin','inputNotes'].forEach(id => document.getElementById(id).value = '');
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
  updateModalLabels();
  const m = document.getElementById('modal');
  m.classList.remove('closing');
  m.classList.add('show');
  setTimeout(() => document.getElementById('inputCarry').focus(), 200);
}

function closeModal() {
  const m = document.getElementById('modal');
  m.classList.add('closing');
  setTimeout(() => { m.classList.remove('show', 'closing'); currentClub = null; }, 250);
}

function saveShot() {
  const carry = parseFloat(document.getElementById('inputCarry').value) || null;
  const total = parseFloat(document.getElementById('inputTotal').value) || null;
  if (!carry && !total) { showToast('Enter at least a distance'); return; }
  const shot = {
    clubId: currentClub, carry, total,
    ballSpeed: parseFloat(document.getElementById('inputBallSpeed').value) || null,
    clubSpeed: parseFloat(document.getElementById('inputClubSpeed').value) || null,
    launch: parseFloat(document.getElementById('inputLaunch').value) || null,
    spin: parseFloat(document.getElementById('inputSpin').value) || null,
    shape: selectedShape,
    notes: document.getElementById('inputNotes').value.trim() || null,
    time: new Date().toISOString()
  };
  const shots = getShots(); shots.push(shot); saveShots(shots);
  closeModal();
  renderAll();
  const club = CLUBS.find(c => c.id === currentClub);
  showToast(`${club?.name || ''} — ${carry || total} ${dl()} logged`);
}

function deleteShot(idx) {
  const shots = getShots(); shots.splice(idx, 1); saveShots(shots);
  renderAll();
  showToast('Shot deleted');
}

function renderAll() {
  renderClubGrid(); renderStats(); renderGapping(); renderHistory(); updateSessionInfo();
  attachSwipe();
}

// Swipe-to-delete: drag a row left to reveal Delete, or flick past threshold to delete instantly.
function attachSwipe() {
  document.querySelectorAll('.swipe-content').forEach(el => {
    if (el.dataset.swipeBound) return;
    el.dataset.swipeBound = '1';
    let startX = 0, startY = 0, curX = 0, dragging = false, locked = null;
    const REVEAL = 92, FLICK = 150;

    const closeOthers = () => document.querySelectorAll('.swipe-content.revealed').forEach(o => { if (o !== el) o.classList.remove('revealed'); });

    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      curX = el.classList.contains('revealed') ? -REVEAL : 0;
      dragging = true; locked = null;
      el.classList.add('dragging');
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      if (!dragging) return;
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (locked === null) {
        if (Math.abs(dx) > 8 || Math.abs(dy) > 8) locked = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
      }
      if (locked !== 'x') return;
      let t = (el.classList.contains('revealed') ? -REVEAL : 0) + dx;
      t = Math.max(-FLICK, Math.min(0, t));
      curX = t;
      el.style.transform = `translateX(${t}px)`;
    }, { passive: true });

    el.addEventListener('touchend', () => {
      if (!dragging) return;
      dragging = false;
      el.classList.remove('dragging');
      el.style.transform = '';
      if (curX <= -FLICK + 4) {
        // flicked far — delete immediately
        const idx = parseInt(el.dataset.idx, 10);
        el.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
        el.style.transform = 'translateX(-110%)';
        el.style.opacity = '0';
        setTimeout(() => deleteShot(idx), 180);
      } else if (curX < -REVEAL / 2) {
        closeOthers();
        el.classList.add('revealed');
      } else {
        el.classList.remove('revealed');
      }
    });

    // tap a revealed row to close it
    el.addEventListener('click', e => {
      if (el.classList.contains('revealed')) { e.stopPropagation(); el.classList.remove('revealed'); }
    });
  });
}

function updateSessionInfo() {
  const shots = getShots();
  const today = shots.filter(s => new Date(s.time).toDateString() === new Date().toDateString());
  document.getElementById('sessionInfo').textContent = today.length ? `${today.length} shots today · ${shots.length} total` : shots.length ? `${shots.length} total shots` : 'Tap a club to start';
}

function toggleSettings() {
  const p = document.getElementById('settingsView');
  if (p.classList.contains('active')) {
    p.classList.remove('active');
    document.querySelector('[data-view="log"]').click();
  } else {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    p.classList.add('active');
  }
}

function initSettings() {
  const settings = getSettings();
  document.querySelectorAll('.pill-group').forEach(group => {
    const key = group.dataset.setting;
    group.querySelectorAll('.pill').forEach(pill => {
      pill.classList.toggle('active', pill.dataset.value === settings[key]);
      pill.addEventListener('click', () => {
        group.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        saveSetting(key, pill.dataset.value);
        renderAll();
      });
    });
  });
}

function exportData() {
  const clubs = CLUBS.filter(c => getClubStats(c.id));
  if (!clubs.length) { showToast('No data to export'); return; }
  const d = dl(), s_ = sl();
  let text = 'SwingTrackr Export — ' + new Date().toLocaleDateString() + '\n' + '═'.repeat(40) + '\n\n';
  clubs.forEach(c => {
    const s = getClubStats(c.id);
    text += `${c.name} (${s.count} shots)\n`;
    if (s.avgCarry) text += `  Avg Carry: ${s.avgCarry} ${d}\n`;
    if (s.avgTotal) text += `  Avg Total: ${s.avgTotal} ${d}\n`;
    if (s.longest) text += `  Longest: ${s.longest} ${d}\n`;
    if (s.dispersion != null) text += `  Dispersion: ±${s.dispersion} ${d}\n`;
    if (s.avgBallSpeed) text += `  Ball Speed: ${s.avgBallSpeed} ${s_}\n`;
    if (s.avgClubSpeed) text += `  Club Speed: ${s.avgClubSpeed} ${s_}\n`;
    if (s.smashFactor) text += `  Smash Factor: ${s.smashFactor}\n`;
    if (s.avgLaunch) text += `  Launch: ${s.avgLaunch}°\n`;
    if (s.avgSpin) text += `  Spin: ${s.avgSpin} rpm\n`;
    if (s.dominantShape) text += `  Tendency: ${s.dominantShape}\n`;
    text += '\n';
  });
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard')).catch(() => {
    const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    showToast('Copied to clipboard');
  });
}

document.querySelectorAll('.shape-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
    if (selectedShape === btn.dataset.shape) { selectedShape = null; }
    else { btn.classList.add('active'); selectedShape = btn.dataset.shape; }
  });
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('settingsView').classList.remove('active');
    tab.classList.add('active');
    document.getElementById(tab.dataset.view).classList.add('active');
  });
});

initSettings();
renderAll();
</script>
