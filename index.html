<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c1c1e">
<title>SwingTrackr</title>
<style>
:root {
  --bg: #000000;
  --bg-secondary: #1c1c1e;
  --bg-card: #2c2c2e;
  --bg-card-hover: #3a3a3c;
  --text: #ffffff;
  --text-secondary: #ebebf5cc;
  --text-tertiary: #ebebf54d;
  --accent: #0a84ff;
  --accent-glow: rgba(10, 132, 255, 0.15);
  --green: #30d158;
  --red: #ff453a;
  --orange: #ff9f0a;
  --yellow: #ffd60a;
  --purple: #bf5af2;
  --border: #38383a;
  --input-bg: #1c1c1e;
  --overlay: rgba(0,0,0,0.6);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 500px;
  margin: 0 auto;
  padding-bottom: 100px;
  -webkit-font-smoothing: antialiased;
}
header {
  background: var(--bg-secondary);
  padding: 16px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(20px);
}
header h1 {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, #0a84ff, #5e5ce6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
header .session-info { font-size: 13px; color: var(--text-tertiary); margin-top: 4px; }
.settings-toggle {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary); padding: 4px;
}
.tabs {
  display: flex; background: var(--bg-secondary); border-bottom: 1px solid var(--border);
  position: sticky; top: 58px; z-index: 10;
}
.tab {
  flex: 1; text-align: center; padding: 12px 8px; font-size: 13px; font-weight: 600;
  color: var(--text-tertiary); cursor: pointer; border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.view { display: none; }
.view.active { display: block; }

/* Club Grid */
.club-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; }
.club-btn {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
  padding: 18px 12px; font-size: 17px; font-weight: 700; color: var(--text);
  cursor: pointer; text-align: center; transition: transform 0.1s, background 0.2s;
}
.club-btn:active { transform: scale(0.96); background: var(--bg-card-hover); }
.club-btn .brand { font-size: 11px; font-weight: 400; color: var(--text-tertiary); display: block; margin-top: 3px; }
.club-btn .avg { font-size: 13px; color: var(--accent); margin-top: 6px; font-weight: 600; }
.club-btn .count { font-size: 11px; color: var(--text-tertiary); }
.club-btn.has-data { border-color: rgba(10,132,255,0.3); box-shadow: 0 0 20px var(--accent-glow); }

/* Stats / Averages */
.stats-list { padding: 16px; }
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
  margin-bottom: 10px; overflow: hidden;
}
.stat-card-header {
  padding: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
}
.stat-card-header h3 { font-size: 16px; color: var(--text); }
.stat-card-header .chevron {
  font-size: 14px; color: var(--text-tertiary); transition: transform 0.2s;
}
.stat-card-header .chevron.open { transform: rotate(90deg); }
.stat-card-body { padding: 0 16px 16px; }
.stat-row { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; color: var(--text-secondary); }
.stat-row .label { color: var(--text-tertiary); }
.stat-row .highlight { color: var(--green); font-weight: 600; }
.stat-row .warn { color: var(--orange); font-weight: 600; }
.stat-divider { border-top: 1px solid var(--border); margin: 10px 0; }
.shot-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.shot-item:last-child { border-bottom: none; }
.shot-item .shot-num { color: var(--text-tertiary); font-weight: 600; width: 28px; }
.shot-item .shot-detail { flex: 1; color: var(--text-secondary); }
.shot-item .shot-detail .shot-note { font-size: 11px; color: var(--text-tertiary); font-style: italic; margin-top: 2px; }
.shot-item .shot-shape { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: var(--bg); color: var(--text-tertiary); margin: 0 6px; }
.shot-item .delete-btn { color: var(--red); font-size: 12px; cursor: pointer; font-weight: 600; padding: 4px 8px; }
.no-data { text-align: center; color: var(--text-tertiary); padding: 60px 20px; font-size: 15px; }

/* Gapping */
.gap-chart { padding: 16px; }
.gap-bar-row { display: flex; align-items: center; margin-bottom: 6px; }
.gap-bar-label { width: 60px; font-size: 13px; font-weight: 600; color: var(--text-secondary); }
.gap-bar-track { flex: 1; height: 28px; background: var(--bg-card); border-radius: 6px; position: relative; overflow: hidden; }
.gap-bar-fill {
  height: 100%; border-radius: 6px; display: flex; align-items: center; justify-content: flex-end;
  padding-right: 8px; font-size: 12px; font-weight: 700; color: #fff;
  transition: width 0.3s;
}
.gap-bar-gap {
  width: 36px; text-align: right; font-size: 11px; color: var(--text-tertiary); margin-left: 6px;
}

/* History / Sessions */
.session-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
  margin: 0 16px 10px; overflow: hidden;
}
.session-header {
  padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
}
.session-header .session-date { font-weight: 700; font-size: 15px; color: var(--text); }
.session-header .session-meta { font-size: 12px; color: var(--text-tertiary); }
.session-header .chevron { font-size: 14px; color: var(--text-tertiary); transition: transform 0.2s; }
.session-header .chevron.open { transform: rotate(90deg); }
.session-shots { display: none; padding: 0 16px 12px; }
.session-shots.open { display: block; }
.session-shot {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.session-shot:last-child { border-bottom: none; }
.session-shot .ss-club { font-weight: 600; color: var(--text); min-width: 60px; }
.session-shot .ss-data { flex: 1; text-align: right; color: var(--text-secondary); }
.session-shot .ss-time { font-size: 11px; color: var(--text-tertiary); margin-left: 8px; min-width: 55px; text-align: right; }
.session-shot .delete-btn { color: var(--red); font-size: 12px; cursor: pointer; font-weight: 600; padding: 4px 8px; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: var(--overlay); z-index: 100;
  align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-secondary); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border);
  width: 100%; max-width: 500px; padding: 24px; padding-bottom: 40px;
  max-height: 90vh; overflow-y: auto;
}
.modal h2 { font-size: 20px; text-align: center; margin-bottom: 20px; font-weight: 700; }
.input-group { margin-bottom: 14px; }
.input-group label {
  display: block; font-size: 12px; color: var(--text-tertiary); margin-bottom: 6px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
}
.input-group input, .input-group select {
  width: 100%; padding: 14px; font-size: 24px; font-weight: 700;
  background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px;
  text-align: center; color: var(--text); -webkit-appearance: none; appearance: none;
}
.input-group input:focus, .input-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.input-group input::placeholder { color: var(--text-tertiary); }
.input-group select { font-size: 16px; }
.input-group select option { background: var(--bg-secondary); }
.input-group.notes-group input { font-size: 15px; font-weight: 400; text-align: left; padding: 12px; }

.shape-picker { display: flex; gap: 6px; flex-wrap: wrap; }
.shape-btn {
  padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text-tertiary); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.shape-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-actions button {
  flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
}
.btn-cancel { background: var(--bg-card); color: var(--text-secondary); }
.btn-save { background: var(--accent); color: #fff; }
.btn-save:active { opacity: 0.85; }
.quick-fields { display: flex; gap: 8px; }
.quick-fields .input-group { flex: 1; }
.quick-fields input { font-size: 18px; }

/* Export */
.export-bar { padding: 16px; }
.btn-export {
  width: 100%; padding: 15px; background: var(--green); color: #000; border: none;
  border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
}

/* Settings */
.settings-panel { display: none; padding: 16px; }
.settings-panel.active { display: block; }
.settings-section {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
  margin-bottom: 12px; overflow: hidden;
}
.setting-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
}
.setting-row:last-child { border-bottom: none; }
.setting-row .setting-label { font-size: 15px; color: var(--text); }
.setting-row .setting-label small { display: block; font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
.pill-group { display: flex; background: var(--bg); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.pill {
  padding: 7px 14px; font-size: 13px; font-weight: 600; color: var(--text-tertiary);
  cursor: pointer; transition: all 0.2s; border: none; background: none;
}
.pill.active { background: var(--accent); color: #fff; }
.section-label {
  padding: 16px 16px 8px; font-size: 12px; color: var(--text-tertiary);
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
}
</style>
</head>
<body>

<header>
  <h1>SwingTrackr</h1>
  <div class="session-info" id="sessionInfo"></div>
  <button class="settings-toggle" onclick="toggleSettings()">&#9881;</button>
</header>

<div class="tabs" id="tabBar">
  <div class="tab active" data-view="log">Log</div>
  <div class="tab" data-view="stats">Averages</div>
  <div class="tab" data-view="gapping">Gapping</div>
  <div class="tab" data-view="history">Sessions</div>
</div>

<div id="log" class="view active">
  <div class="club-grid" id="clubGrid"></div>
</div>

<div id="stats" class="view">
  <div class="stats-list" id="statsList"></div>
  <div class="export-bar">
    <button class="btn-export" onclick="exportData()">Export All Data (Copy)</button>
  </div>
</div>

<div id="gapping" class="view">
  <div class="section-label">Club Gapping (Avg Carry)</div>
  <div class="gap-chart" id="gapChart"></div>
</div>

<div id="history" class="view">
  <div id="historyList"></div>
</div>

<div id="settingsView" class="settings-panel">
  <div class="section-label">Units</div>
  <div class="settings-section">
    <div class="setting-row">
      <div class="setting-label">Distance<small>Carry &amp; total</small></div>
      <div class="pill-group" data-setting="distance">
        <button class="pill" data-value="yds">Yards</button>
        <button class="pill" data-value="m">Meters</button>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-label">Speed<small>Ball &amp; club speed</small></div>
      <div class="pill-group" data-setting="speed">
        <button class="pill" data-value="mph">mph</button>
        <button class="pill" data-value="kph">km/h</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">Log Shot</h2>
    <div class="input-group">
      <label id="labelCarry">Carry Distance (yds)</label>
      <input type="number" id="inputCarry" inputmode="decimal" placeholder="0">
    </div>
    <div class="input-group">
      <label id="labelTotal">Total Distance (yds)</label>
      <input type="number" id="inputTotal" inputmode="decimal" placeholder="0">
    </div>
    <div class="quick-fields">
      <div class="input-group">
        <label id="labelBallSpeed">Ball Speed (mph)</label>
        <input type="number" id="inputBallSpeed" inputmode="decimal" placeholder="—">
      </div>
      <div class="input-group">
        <label id="labelClubSpeed">Club Speed (mph)</label>
        <input type="number" id="inputClubSpeed" inputmode="decimal" placeholder="—">
      </div>
    </div>
    <div class="quick-fields">
      <div class="input-group">
        <label>Launch Angle</label>
        <input type="number" id="inputLaunch" inputmode="decimal" placeholder="—" step="0.1">
      </div>
      <div class="input-group">
        <label>Spin (rpm)</label>
        <input type="number" id="inputSpin" inputmode="decimal" placeholder="—">
      </div>
    </div>
    <div class="input-group">
      <label>Shot Shape</label>
      <div class="shape-picker" id="shapePicker">
        <button class="shape-btn" data-shape="straight">Straight</button>
        <button class="shape-btn" data-shape="draw">Draw</button>
        <button class="shape-btn" data-shape="fade">Fade</button>
        <button class="shape-btn" data-shape="hook">Hook</button>
        <button class="shape-btn" data-shape="slice">Slice</button>
        <button class="shape-btn" data-shape="pull">Pull</button>
        <button class="shape-btn" data-shape="push">Push</button>
      </div>
    </div>
    <div class="input-group notes-group">
      <label>Notes (optional)</label>
      <input type="text" id="inputNotes" placeholder="Swing thought, miss, etc.">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveShot()">Save Shot</button>
    </div>
  </div>
</div>

<script>
const CLUBS = [
  { id: 'dr', name: 'Driver', brand: 'TaylorMade' },
  { id: '3w', name: '3 Wood', brand: 'TaylorMade' },
  { id: '4i', name: '4 Iron', brand: 'Mizuno' },
  { id: '5i', name: '5 Iron', brand: 'Mizuno' },
  { id: '6i', name: '6 Iron', brand: 'Mizuno' },
  { id: '7i', name: '7 Iron', brand: 'Mizuno' },
  { id: '8i', name: '8 Iron', brand: 'Mizuno' },
  { id: '9i', name: '9 Iron', brand: 'Mizuno' },
  { id: 'pw', name: 'PW (43)', brand: 'Mizuno' },
  { id: 'gw', name: 'GW (48)', brand: 'Mizuno' },
  { id: 'sw', name: 'SW (54)', brand: 'Mizuno' },
  { id: 'lw', name: 'LW (58)', brand: 'Mizuno' },
];

const STORAGE_KEY = 'swingtrackr_shots';
const SETTINGS_KEY = 'swingtrackr_settings';
let currentClub = null;
let selectedShape = null;
let expandedCards = {};
let expandedSessions = {};

function getSettings() { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{"distance":"yds","speed":"mph"}'); }
function saveSetting(k, v) { const s = getSettings(); s[k] = v; localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }
function distLabel() { return getSettings().distance === 'yds' ? 'yds' : 'm'; }
function speedLabel() { return getSettings().speed === 'mph' ? 'mph' : 'km/h'; }

function getShots() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
function saveShots(shots) { localStorage.setItem(STORAGE_KEY, JSON.stringify(shots)); }

function getClubStats(clubId) {
  const shots = getShots().filter(s => s.clubId === clubId);
  if (!shots.length) return null;
  const vals = (key) => shots.map(s => s[key]).filter(v => v != null && v > 0);
  const avg = (key) => { const v = vals(key); return v.length ? Math.round(v.reduce((a,b) => a+b, 0) / v.length) : null; };
  const avgDec = (key) => { const v = vals(key); return v.length ? (v.reduce((a,b) => a+b, 0) / v.length).toFixed(1) : null; };
  const stdDev = (key) => {
    const v = vals(key);
    if (v.length < 2) return null;
    const mean = v.reduce((a,b) => a+b, 0) / v.length;
    return Math.round(Math.sqrt(v.reduce((sum, x) => sum + (x - mean) ** 2, 0) / v.length));
  };
  const carryVals = vals('carry');
  const smashVals = shots.filter(s => s.ballSpeed > 0 && s.clubSpeed > 0).map(s => s.ballSpeed / s.clubSpeed);
  const shapes = shots.map(s => s.shape).filter(Boolean);
  const shapeCounts = {};
  shapes.forEach(s => { shapeCounts[s] = (shapeCounts[s] || 0) + 1; });
  const dominantShape = Object.entries(shapeCounts).sort((a,b) => b[1] - a[1])[0];

  return {
    count: shots.length,
    avgCarry: avg('carry'),
    avgTotal: avg('total'),
    avgBallSpeed: avg('ballSpeed'),
    avgClubSpeed: avg('clubSpeed'),
    avgLaunch: avgDec('launch'),
    avgSpin: avg('spin'),
    dispersion: stdDev('carry'),
    longest: carryVals.length ? Math.max(...carryVals) : null,
    shortest: carryVals.length ? Math.min(...carryVals) : null,
    smashFactor: smashVals.length ? (smashVals.reduce((a,b) => a+b, 0) / smashVals.length).toFixed(2) : null,
    dominantShape: dominantShape ? dominantShape[0] : null,
    shots
  };
}

function renderClubGrid() {
  const grid = document.getElementById('clubGrid');
  const dl = distLabel();
  grid.innerHTML = CLUBS.map(c => {
    const stats = getClubStats(c.id);
    const hasData = stats != null;
    return `<button class="club-btn${hasData ? ' has-data' : ''}" onclick="openModal('${c.id}')">
      ${c.name}<span class="brand">${c.brand}</span>
      ${hasData ? `<div class="avg">${stats.avgCarry || '—'} ${dl}</div><div class="count">${stats.count} shot${stats.count>1?'s':''}</div>` : '<div class="avg" style="color:var(--text-tertiary)">No data</div>'}
    </button>`;
  }).join('');
}

function renderStats() {
  const list = document.getElementById('statsList');
  const clubsWithData = CLUBS.filter(c => getClubStats(c.id));
  const dl = distLabel();
  const sl = speedLabel();
  if (!clubsWithData.length) {
    list.innerHTML = '<div class="no-data">No shots logged yet.<br>Tap a club to start!</div>';
    return;
  }
  list.innerHTML = clubsWithData.map(c => {
    const s = getClubStats(c.id);
    const isOpen = expandedCards[c.id];
    const row = (label, val, unit='', cls='') => val != null ? `<div class="stat-row"><span class="label">${label}</span><span class="${cls}">${val}${unit}</span></div>` : '';
    return `<div class="stat-card">
      <div class="stat-card-header" onclick="toggleCard('${c.id}')">
        <h3>${c.name} <span style="font-weight:400;color:var(--text-tertiary);font-size:13px">(${s.count})</span></h3>
        <span class="chevron ${isOpen?'open':''}">&#9656;</span>
      </div>
      <div class="stat-card-body" style="display:${isOpen?'block':'none'}">
        ${row('Avg Carry', s.avgCarry, ' ' + dl)}
        ${row('Avg Total', s.avgTotal, ' ' + dl)}
        ${row('Longest', s.longest, ' ' + dl, 'highlight')}
        ${row('Shortest', s.shortest, ' ' + dl)}
        ${s.dispersion != null ? row('Dispersion (±)', s.dispersion, ' ' + dl, s.dispersion > 10 ? 'warn' : 'highlight') : ''}
        ${row('Avg Ball Speed', s.avgBallSpeed, ' ' + sl)}
        ${row('Avg Club Speed', s.avgClubSpeed, ' ' + sl)}
        ${row('Smash Factor', s.smashFactor, '', s.smashFactor >= 1.45 ? 'highlight' : '')}
        ${row('Avg Launch', s.avgLaunch, '°')}
        ${row('Avg Spin', s.avgSpin, ' rpm')}
        ${s.dominantShape ? row('Tendency', s.dominantShape, '') : ''}
        <div class="stat-divider"></div>
        <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Individual Shots</div>
        ${s.shots.map((shot, i) => {
          const allShots = getShots();
          const realIdx = allShots.indexOf(shot) !== -1 ? allShots.indexOf(shot) : allShots.findIndex(x => x.time === shot.time && x.clubId === shot.clubId);
          const time = new Date(shot.time).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
          return `<div class="shot-item">
            <span class="shot-num">#${i+1}</span>
            <div class="shot-detail">
              ${shot.carry ? shot.carry + ' ' + dl : ''}${shot.total ? ' / ' + shot.total + ' total' : ''}
              ${shot.ballSpeed ? ' &middot; ' + shot.ballSpeed + ' ' + sl : ''}
              ${shot.smashFactor || (shot.ballSpeed && shot.clubSpeed) ? ' &middot; SF ' + (shot.ballSpeed / shot.clubSpeed).toFixed(2) : ''}
              <br><span style="color:var(--text-tertiary)">${time}</span>
              ${shot.notes ? '<div class="shot-note">' + shot.notes + '</div>' : ''}
            </div>
            ${shot.shape ? '<span class="shot-shape">' + shot.shape + '</span>' : ''}
            <span class="delete-btn" onclick="deleteShot(${realIdx})">Delete</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(clubId) {
  expandedCards[clubId] = !expandedCards[clubId];
  renderStats();
}

function renderGapping() {
  const chart = document.getElementById('gapChart');
  const dl = distLabel();
  const clubsWithCarry = CLUBS.map(c => ({ ...c, stats: getClubStats(c.id) })).filter(c => c.stats?.avgCarry);
  if (clubsWithCarry.length < 2) {
    chart.innerHTML = '<div class="no-data">Log at least 2 clubs to see gapping.</div>';
    return;
  }
  const max = Math.max(...clubsWithCarry.map(c => c.stats.avgCarry));
  const colors = ['#0a84ff','#5e5ce6','#bf5af2','#ff375f','#ff9f0a','#ffd60a','#30d158','#64d2ff','#0a84ff','#5e5ce6','#bf5af2','#ff375f'];

  const IDEAL_GAP = distLabel() === 'yds' ? 12 : 11;
  const GAP_WARN = IDEAL_GAP * 2;

  let barsHtml = clubsWithCarry.map((c, i) => {
    const pct = (c.stats.avgCarry / max * 100).toFixed(0);
    const gap = i > 0 ? clubsWithCarry[i-1].stats.avgCarry - c.stats.avgCarry : null;
    const gapColor = gap != null ? (gap > GAP_WARN ? 'var(--red)' : gap > IDEAL_GAP + 4 ? 'var(--orange)' : 'var(--text-tertiary)') : '';
    return `<div class="gap-bar-row">
      <span class="gap-bar-label">${c.name.replace(' Iron','i').replace(' Wood','w').replace('Driver','Dr')}</span>
      <div class="gap-bar-track">
        <div class="gap-bar-fill" style="width:${pct}%;background:${colors[i % colors.length]}">${c.stats.avgCarry} ${dl}</div>
      </div>
      <span class="gap-bar-gap" style="color:${gapColor}">${gap != null ? (gap >= 0 ? '+' : '') + gap : ''}</span>
    </div>`;
  }).join('');

  const recommendations = [];
  for (let i = 1; i < clubsWithCarry.length; i++) {
    const gap = clubsWithCarry[i-1].stats.avgCarry - clubsWithCarry[i].stats.avgCarry;
    const upper = clubsWithCarry[i-1];
    const lower = clubsWithCarry[i];
    if (gap > GAP_WARN) {
      const midpoint = Math.round(lower.stats.avgCarry + gap / 2);
      const upperShort = upper.name.replace(' Iron','i').replace(' Wood','w').replace('Driver','Dr');
      const lowerShort = lower.name.replace(' Iron','i').replace(' Wood','w').replace('Driver','Dr');

      let suggestion = '';
      if (gap > 40 && upper.id === 'dr') {
        suggestion = `Consider a <strong>3 or 5 wood</strong> or <strong>driving iron</strong> to fill the ${gap} ${dl} gap between ${upperShort} and ${lowerShort}. Target: ~${midpoint} ${dl}.`;
      } else if (gap > 40) {
        suggestion = `Consider a <strong>hybrid or utility iron</strong> to cover the ${gap} ${dl} gap between ${upperShort} and ${lowerShort}. Target: ~${midpoint} ${dl}.`;
      } else if (gap > GAP_WARN) {
        const loftBetween = '';
        suggestion = `${gap} ${dl} gap between ${upperShort} and ${lowerShort} is large. A <strong>hybrid</strong> or <strong>additional wedge/iron</strong> around ${midpoint} ${dl} would tighten your gapping.`;
      }
      recommendations.push(suggestion);
    }
  }

  if (clubsWithCarry.length >= 3) {
    const gaps = [];
    for (let i = 1; i < clubsWithCarry.length; i++) {
      gaps.push(clubsWithCarry[i-1].stats.avgCarry - clubsWithCarry[i].stats.avgCarry);
    }
    const avgGap = Math.round(gaps.reduce((a,b) => a+b, 0) / gaps.length);
    const inconsistent = gaps.some(g => Math.abs(g - avgGap) > 8);
    if (inconsistent && !recommendations.length) {
      recommendations.push(`Your gaps are inconsistent (avg ${avgGap} ${dl}). Consider a fitting session to dial in lofts and get even spacing.`);
    }
  }

  let recsHtml = '';
  if (recommendations.length) {
    recsHtml = `<div style="padding:0 0 8px;margin-top:16px">
      <div style="font-size:12px;color:var(--text-tertiary);font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px">Recommendations</div>
      ${recommendations.map(r => `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;font-size:13px;color:var(--text-secondary);line-height:1.5">&#9889; ${r}</div>`).join('')}
    </div>`;
  } else if (clubsWithCarry.length >= 4) {
    recsHtml = `<div style="padding:12px 0;text-align:center;font-size:13px;color:var(--green)">&#10003; Your gapping looks solid!</div>`;
  }

  chart.innerHTML = barsHtml + recsHtml;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const shots = getShots();
  const dl = distLabel();
  const sl = speedLabel();
  if (!shots.length) {
    list.innerHTML = '<div class="no-data">No sessions yet.</div>';
    return;
  }

  const sessions = [];
  let currentSession = null;
  const SESSION_GAP = 2 * 60 * 60 * 1000;
  shots.forEach((s, idx) => {
    const t = new Date(s.time).getTime();
    if (!currentSession || t - currentSession.lastTime > SESSION_GAP) {
      currentSession = { date: s.time, shots: [], indices: [], lastTime: t };
      sessions.push(currentSession);
    }
    currentSession.shots.push(s);
    currentSession.indices.push(idx);
    currentSession.lastTime = t;
  });

  list.innerHTML = sessions.reverse().map((sess, si) => {
    const d = new Date(sess.date);
    const dateStr = d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
    const timeRange = new Date(sess.date).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}) +
      ' – ' + new Date(sess.shots[sess.shots.length-1].time).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
    const clubsHit = [...new Set(sess.shots.map(s => s.clubId))].length;
    const isOpen = expandedSessions[si];

    return `<div class="session-card">
      <div class="session-header" onclick="toggleSession(${si})">
        <div>
          <div class="session-date">${dateStr}</div>
          <div class="session-meta">${timeRange} &middot; ${sess.shots.length} shots &middot; ${clubsHit} clubs</div>
        </div>
        <span class="chevron ${isOpen?'open':''}">&#9656;</span>
      </div>
      <div class="session-shots ${isOpen?'open':''}">
        ${sess.shots.map((s, j) => {
          const club = CLUBS.find(c => c.id === s.clubId);
          const time = new Date(s.time).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
          const realIdx = sess.indices[j];
          return `<div class="session-shot">
            <span class="ss-club">${club?.name || s.clubId}</span>
            <span class="ss-data">
              ${s.carry ? s.carry + ' ' + dl : ''}${s.total ? ' / ' + s.total : ''}
              ${s.shape ? ' <span style="color:var(--text-tertiary)">(' + s.shape + ')</span>' : ''}
            </span>
            <span class="ss-time">${time}</span>
            <span class="delete-btn" onclick="deleteShot(${realIdx})">Del</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleSession(idx) {
  expandedSessions[idx] = !expandedSessions[idx];
  renderHistory();
}

function updateModalLabels() {
  document.getElementById('labelCarry').textContent = `Carry Distance (${distLabel()})`;
  document.getElementById('labelTotal').textContent = `Total Distance (${distLabel()})`;
  document.getElementById('labelBallSpeed').textContent = `Ball Speed (${speedLabel()})`;
  document.getElementById('labelClubSpeed').textContent = `Club Speed (${speedLabel()})`;
}

function openModal(clubId) {
  currentClub = clubId;
  selectedShape = null;
  const club = CLUBS.find(c => c.id === clubId);
  document.getElementById('modalTitle').textContent = club.name;
  ['inputCarry','inputTotal','inputBallSpeed','inputClubSpeed','inputLaunch','inputSpin','inputNotes'].forEach(id => document.getElementById(id).value = '');
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
  updateModalLabels();
  document.getElementById('modal').classList.add('show');
  setTimeout(() => document.getElementById('inputCarry').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  currentClub = null;
}

function saveShot() {
  const carry = parseFloat(document.getElementById('inputCarry').value) || null;
  const total = parseFloat(document.getElementById('inputTotal').value) || null;
  if (!carry && !total) { alert('Enter at least carry or total distance'); return; }
  const shot = {
    clubId: currentClub, carry, total,
    ballSpeed: parseFloat(document.getElementById('inputBallSpeed').value) || null,
    clubSpeed: parseFloat(document.getElementById('inputClubSpeed').value) || null,
    launch: parseFloat(document.getElementById('inputLaunch').value) || null,
    spin: parseFloat(document.getElementById('inputSpin').value) || null,
    shape: selectedShape,
    notes: document.getElementById('inputNotes').value.trim() || null,
    time: new Date().toISOString()
  };
  const shots = getShots();
  shots.push(shot);
  saveShots(shots);
  closeModal();
  renderAll();
}

function deleteShot(idx) {
  if (!confirm('Delete this shot?')) return;
  const shots = getShots();
  shots.splice(idx, 1);
  saveShots(shots);
  renderAll();
}

function renderAll() {
  renderClubGrid();
  renderStats();
  renderGapping();
  renderHistory();
  updateSessionInfo();
}

function updateSessionInfo() {
  const shots = getShots();
  const today = shots.filter(s => new Date(s.time).toDateString() === new Date().toDateString());
  document.getElementById('sessionInfo').textContent = today.length ? `${today.length} shots today` : 'Tap a club to log your first shot';
}

function toggleSettings() {
  const panel = document.getElementById('settingsView');
  const views = document.querySelectorAll('.view');
  const tabs = document.querySelectorAll('.tab');
  if (panel.classList.contains('active')) {
    panel.classList.remove('active');
    document.querySelector('[data-view="log"]').click();
  } else {
    views.forEach(v => v.classList.remove('active'));
    tabs.forEach(t => t.classList.remove('active'));
    panel.classList.add('active');
  }
}

function initSettings() {
  const settings = getSettings();
  document.querySelectorAll('.pill-group').forEach(group => {
    const key = group.dataset.setting;
    group.querySelectorAll('.pill').forEach(pill => {
      pill.classList.toggle('active', pill.dataset.value === settings[key]);
      pill.addEventListener('click', () => {
        group.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        saveSetting(key, pill.dataset.value);
        renderAll();
      });
    });
  });
}

function exportData() {
  const clubsWithData = CLUBS.filter(c => getClubStats(c.id));
  if (!clubsWithData.length) { alert('No data to export'); return; }
  const dl = distLabel(); const sl = speedLabel();
  let text = 'SwingTrackr Data Export - ' + new Date().toLocaleDateString() + '\n' + '='.repeat(44) + '\n\n';
  clubsWithData.forEach(c => {
    const s = getClubStats(c.id);
    text += `${c.name} (${s.count} shots)\n`;
    if (s.avgCarry) text += `  Avg Carry: ${s.avgCarry} ${dl}\n`;
    if (s.avgTotal) text += `  Avg Total: ${s.avgTotal} ${dl}\n`;
    if (s.longest) text += `  Longest: ${s.longest} ${dl}\n`;
    if (s.dispersion != null) text += `  Dispersion: ±${s.dispersion} ${dl}\n`;
    if (s.avgBallSpeed) text += `  Avg Ball Speed: ${s.avgBallSpeed} ${sl}\n`;
    if (s.avgClubSpeed) text += `  Avg Club Speed: ${s.avgClubSpeed} ${sl}\n`;
    if (s.smashFactor) text += `  Smash Factor: ${s.smashFactor}\n`;
    if (s.avgLaunch) text += `  Avg Launch: ${s.avgLaunch}°\n`;
    if (s.avgSpin) text += `  Avg Spin: ${s.avgSpin} rpm\n`;
    if (s.dominantShape) text += `  Tendency: ${s.dominantShape}\n`;
    text += `  Carries: ${s.shots.map(x => x.carry || '—').join(', ')}\n\n`;
  });
  navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!')).catch(() => {
    const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); alert('Copied!');
  });
}

// Shape picker
document.querySelectorAll('.shape-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
    if (selectedShape === btn.dataset.shape) {
      selectedShape = null;
    } else {
      btn.classList.add('active');
      selectedShape = btn.dataset.shape;
    }
  });
});

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('settingsView').classList.remove('active');
    tab.classList.add('active');
    document.getElementById(tab.dataset.view).classList.add('active');
  });
});

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

initSettings();
renderAll();
</script>
</body>
</html>
